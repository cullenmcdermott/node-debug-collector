# These ExternalSecrets require External Secrets Operator with a ClusterSecretStore
# named "1password" backed by 1Password Connect. Adapt the remoteRef fields for
# your own secret store (Vault, AWS Secrets Manager, etc.) or replace with plain
# Kubernetes Secrets if you manage secrets differently.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: node-debug-collector-omni
  namespace: node-debug
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password # REPLACE with your ClusterSecretStore name
  target:
    name: node-debug-collector-omni
    creationPolicy: Owner
  data:
    - secretKey: sa-key
      remoteRef:
        key: node-remediation # REPLACE with your 1Password item name
        property: omni-sa-key
