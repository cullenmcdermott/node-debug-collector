---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-debug-collector
  namespace: node-debug
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-debug-collector
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-debug-collector
subjects:
  - kind: ServiceAccount
    name: node-debug-collector
    namespace: node-debug
roleRef:
  kind: ClusterRole
  name: node-debug-collector
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: node-debug-collector-lease
  namespace: node-debug
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: node-debug-collector-lease
  namespace: node-debug
subjects:
  - kind: ServiceAccount
    name: node-debug-collector
    namespace: node-debug
roleRef:
  kind: Role
  name: node-debug-collector-lease
  apiGroup: rbac.authorization.k8s.io
