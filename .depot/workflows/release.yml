name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: depot-ubuntu-24.04
    env:
      FLOX_DISABLE_METRICS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '.flox/env/manifest.toml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          save: false

      - name: Install Flox
        run: |
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
          nix profile install \
            --experimental-features "nix-command flakes" \
            --accept-flake-config \
            'github:flox/flox/v1.11.0'

      - name: Activate Flox environment
        run: |
          . ~/.nix-profile/etc/profile.d/nix.sh
          flox activate -vv -- true

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          TAGS="${{ github.sha }},latest"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAGS="$TAGS,$GITHUB_REF_NAME"
          fi
          echo "value=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          KO_DOCKER_REPO: ghcr.io/cullenmcdermott/node-debug-collector
        run: |
          flox activate -- ko build --platform=linux/amd64,linux/arm64 \
            --bare \
            --tags="${{ steps.tags.outputs.value }}" \
            .

      - name: Fix Nix permissions for caching
        if: always()
        run: sudo chmod -R a+r /nix && sudo find /nix -type d -exec chmod a+rx {} +

      - name: Save Nix store cache
        if: always()
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '.flox/env/manifest.toml') }}
          lookup-only: true
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P1DT12H
          purge-primary-key: never
